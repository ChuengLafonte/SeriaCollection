name: SeriaCollection
version: ${project.version}
main: id.seria.collection.SeriaCollectionPlugin
api-version: '1.21'
author: Seria
description: Collection System for tracking materials in Project Seria Servers
depend: [SeriaCore]
commands:
  collect:
    description: Open the collection menu
    aliases: [collection]
  seriacollection:
    description: Admin commands for SeriaCollection
    aliases: [scollect]
    permission: seriacollection.admin
permissions:
  seriacollection.admin:
    description: Allows use of admin commands
    default: op
