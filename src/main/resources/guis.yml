# ======================================================
# SeriaCollection - GUI Configuration
# ======================================================

# --- COLLECTION SYSTEM GUIS ---

main-menu:
  title: "<dark_grey><b>|</b> <dark_grey>Seria Collection"
  size: 27
  filler:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
  items:
    info:
      slot: 4
      material: PAINTING
      name: "<green>Collections"
      lore:
        - "<gray>Lihat semua item yang tersedia"
        - "<gray>di Caveblock. Kumpulkan item lebih"
        - "<gray>banyak untuk membuka hadiah dalam"
        - "<gray>perjalananmu menjadi Raja"
        - "<gray>Caveblock!"
        - ""
        - "<gray>Koleksi Terbuka: <yellow>%percentage%%"
        - "<dark_gray>---------------------------- <yellow>%unlocked%/%total%"
        - ""
        - "<yellow>Klik untuk melihat peringkat!"
    close:
      slot: 22
      material: BARRIER
      name: "<red>Tutup"
    categories:
      slots: [10, 11, 12, 13, 14, 15, 16]
      footer:
        - ""
        - "<gray>Progres: <green>%percentage%%"
        - "%progress_bar% <yellow>%unlocked%/%total%"
        - ""
        - "<yellow>Klik untuk melihat detail!"
    crafted-minions:
      slot: 23
      material: PLAYER_HEAD
      head-value: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjljMzhmZTRmYzk4YTI0ODA3OWNkMDRjNjViNmJmZjliNDUwMTdmMTY0NjBkYWIzYzM0YzE3YmZjM2VlMWQyZiJ9fX0="
      name: "<green>Crafted Minions"
      lore:
        - "<gray>View all the unique minions that you"
        - "<gray>have crafted."
        - ""
        - "<yellow>Click to view!"

category-menu:
  title: "<dark_grey><b>|</b> <dark_grey>%category%"
  size: 36
  filler:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
  items:
    info:
      slot: 4
      # Material diwarisi dari ikon kategori
      name: "%category%"
      lore:
        - "<gray>Lihat Koleksi %category% <gray>milikmu!"
        - ""
        - "<gray>Koleksi Terbuka: <gold>%percentage%%"
        - "<dark_gray>---------------------------- <yellow>%unlocked%/%total%"
    back:
      slot: 27
      material: ARROW
      name: "<red>Kembali"
    close:
      slot: 31
      material: BARRIER
      name: "<red>Tutup"
    collections:
      slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 23, 24, 25, 26]
      # Lore untuk setiap item koleksi
      lore:
        - ""
        - "<gray>Progres: <yellow>%amount%"
        - "<gray>Tingkat Berikutnya: <white>%next_tier%"
        - "<gray>Syarat: <yellow>%amount_formatted% <gray>/ <white>%requirement_formatted%"
        - ""
        - "<green>Klik untuk melihat detail!"
      maxed-lore:
        - ""
        - "<gray>Progres: <yellow>%amount%"
        - "<green>SUDAH MAKSIMAL!"

collection-detail:
  title: "<dark_grey><b>|</b> <dark_grey>%collection% Collections"
  size: 54
  filler:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
  items:
    info:
      slot: 4
      # Material diwarisi dari material koleksi
      name: "<yellow>%collection% Collections"
      lore:
        - "<gray>Lihat semua progres dan hadiah"
        - "<gray>Koleksi %collection% milikmu!"
        - ""
        - "<gray>Total Terkumpul: <yellow>%amount_formatted%"
    back:
      slot: 45
      material: ARROW
      name: "<red>Kembali"
    close:
      slot: 49
      material: BARRIER
      name: "<red>Tutup"
    tiers:
      slots: [19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]
      unlocked-material: LIME_STAINED_GLASS_PANE
      locked-material: RED_STAINED_GLASS_PANE
      name: "%status_color%%collection% %tier%"
      lore:
        - "<gray>Progres: <green>%percentage%%"
        - "%progress_bar% <yellow>%amount_formatted%/%requirement_formatted%"
        - ""
        - "<white>Hadiah:"
        - "%rewards_list%"
        - ""
        - "%status_text%"
      unlocked-status: "<green>TERBUKA"
      locked-status: "<red>TERKUNCI"

# --- RECIPE BOOK GUIS ---

recipe-book:
  main-menu:
    title: "<dark_grey><b>|</b> <dark_grey>Recipe Book"
    size: 27
    close-slot: 22
    info:
      slot: 4
      material: BOOK
      name: "<green>Recipe Book"
      description:
        - "<white>Through your adventure, you will"
        - "<white>unlock recipes for all kinds of"
        - "<white>special items! You can view how"
        - "<white>to craft these items here."
        - ""
        - "<gray>Recipe Book Unlocked: <yellow>%percentage%%"
        - "<dark_gray>------------------------- <yellow>%unlocked%/%total%"
    categories:
      farming:
        slot: 11
        material: GOLDEN_HOE
        name: "<green>Farming Recipes"
        description: "<gray>View all of the Farming Recipes that you have unlocked!"
      mining:
        slot: 12
        material: STONE_PICKAXE
        name: "<green>Mining Recipes"
        description: "<gray>View all of the Mining Recipes that you have unlocked!"
      foraging:
        slot: 14
        material: STONE_AXE
        name: "<green>Foraging Recipes"
        description: "<gray>View all of the Foraging Recipes that you have unlocked!"
      minion:
        slot: 15
        material: PLAYER_HEAD
        head-value: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjljMzhmZTRmYzk4YTI0ODA3OWNkMDRjNjViNmJmZjliNDUwMTdmMTY0NjBkYWIzYzM0YzE3YmZjM2VlMWQyZiJ9fX0="
        name: "<green>Minion Recipes"
        description: "<gray>View all of the Minion Recipes that you have unlocked!"
      others:
        slot: 16
        material: ARROW
        name: "<green>Other Recipes"
        description: "<gray>View various miscellaneous recipes!"

  list-menu:
    title: "<dark_grey><b>|</b> <dark_grey>(%page%/%max_page%) %category%"
    
  detail-menu:
    title: "<dark_grey><b>|</b> <dark_grey>Recipe: %item%"
