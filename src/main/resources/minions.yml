# Milestone hadiah slot minion berdasarkan jumlah unik minion yang telah di-craft.
# Format: JUMLAH_UNIK: MILESTONE_LEVEL
# MILESTONE_LEVEL akan memberikan permission: seria.topminion.<level>
# Pastikan level ini selaras dengan konfigurasi permission di plugin TopMinion.
milestones:
  5: 2
  15: 3
  30: 4
  50: 5
  75: 6
  100: 7
  125: 8
  150: 9
  175: 10
  200: 11
  225: 12
  250: 13
  262: 14

# Konfigurasi tampilan ikon minion di dalam menu Crafted Minions.
# Properti:
#   material: Material item (Default: PLAYER_HEAD)
#   head-value: Texture value jika menggunakan PLAYER_HEAD
#   display-name: Nama yang tampil di GUI
#   internal-id: ID asli minion di TopMinion (Gunakan ini jika nama kunci berbeda dengan ID sistem)
#   max-tiers: Jumlah level yang akan ditampilkan di lore (Default: 12)

